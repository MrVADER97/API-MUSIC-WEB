<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SONIDO · Género</title>
  <meta name="description" content="Página de género del Atlas Musical SONIDO." />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;500;700&family=Permanent+Marker&family=Abril+Fatface&family=UnifrakturCook:wght@700&family=Bungee+Shade&family=Cormorant+Garamond:ital,wght@1,400;1,700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/styles.css?v=2" />
  <link rel="stylesheet" href="/css/genres.css" />
</head>
<body data-genre="hiphop">

  <nav class="navbar navbar-expand-lg navbar-sonido fixed-top">
    <div class="container">
      <a class="navbar-brand brand-mono" href="/">SONIDO · EST 2026</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#navMenu" aria-label="Abrir menú">
        <span class="text-light" style="font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.2em;">MENU</span>
      </button>
      <div class="offcanvas offcanvas-end" tabindex="-1" id="navMenu" style="background-color: hsl(240 10% 6%);">
        <div class="offcanvas-header">
          <span class="brand-mono">NAVEGACIÓN</span>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
        </div>
        <div class="offcanvas-body">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-4">
            <li class="nav-item"><a class="nav-link" data-genre="hiphop"   href="/pages/hiphop.html">Hip Hop</a></li>
            <li class="nav-item"><a class="nav-link" data-genre="jazz"     href="/pages/jazz.html">Jazz</a></li>
            <li class="nav-item"><a class="nav-link" data-genre="flamenco" href="/pages/flamenco.html">Flamenco</a></li>
            <li class="nav-item"><a class="nav-link" data-genre="pop"      href="/pages/pop.html">Pop</a></li>
            <li class="nav-item"><a class="nav-link" data-genre="rock"     href="/pages/rock.html">Rock</a></li>
            <li class="nav-item"><a class="nav-link" href="/buscador.html">BUSCADOR</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <main style="padding-top: 6rem;">

    <!-- ===== HERO de género ===== -->
    <header class="section pb-0">
      <div class="container">
        <p class="section-eyebrow reveal" data-fill="eyebrow">GÉNERO</p>
        <h1 class="section-title reveal" data-fill="title">—</h1>
        <p class="reveal mt-3" data-fill="tagline" style="font-family:'Playfair Display',serif;font-style:italic;font-size:1.25rem;color:hsl(var(--muted-foreground));max-width:36rem;"></p>

        <div class="row g-3 mt-4 reveal" data-fill="origin"></div>
      </div>
    </header>

    <!-- ===== Contenido principal ===== -->
    <section class="section">
      <div class="container">
        <div class="row g-5">

          <!-- Leyendas -->
          <div class="col-12">
            <div class="d-flex align-items-center gap-3 mb-4">
              <span class="brand-mono">LEYENDAS</span>
              <div class="divider-glow"></div>
            </div>
            <div class="d-flex flex-column gap-3" data-fill="highlights"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== Historia ===== -->
    <section class="section pt-0">
      <div class="container">
        <div class="row">
          <div class="col-lg-8">
            <div class="d-flex align-items-center gap-3 mb-4">
              <span class="brand-mono">HISTORIA</span>
              <div class="divider-glow"></div>
            </div>
            <div data-fill="history"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== iTunes en directo ===== -->
    <section class="section pt-0">
      <div class="container">
        <div class="d-flex align-items-center gap-3 mb-4">
          <span class="brand-mono">EN DIRECTO</span>
          <div class="divider-glow"></div>
        </div>
        <div id="itunesGrid" class="row g-3" data-fill="itunes"></div>
      </div>
    </section>

  </main>

  <footer class="footer-sonido">
    <div class="container">
      <div class="row gy-3 align-items-center">
        <div class="col-md-4">© <span data-year></span> · SONIDO · UDIT DWA</div>
        <div class="col-md-4 text-md-center"><a href="/buscador.html">→ BUSCADOR Lab</a></div>
        <div class="col-md-4 text-md-end"><a href="/">← Inicio</a></div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <script src="/js/data.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/genre.js"></script>
  <script src="/js/main.js?v=2"></script>
</body>
</html>
